name: test

on:
  push:
  pull_request:
  workflow_dispatch:

# Some jobs are `continue-on-error: true`; each is a documented reproduction
# of a known issue or a fase finding, not flakiness -- see the comment on
# each job, docs/BASELINE.md and PLAN.md §6 for the full inventory.
#
# Fase 2: tutorial.sh is shellcheck-clean and runtime-agnostic; #33's
# empty-ansible_host bug is fixed via a portable per-container inspect.
# shellcheck is blocking.
#
# Fase 3 (this change): images are now BUILT locally from images/ (`make
# build_all`) on a modern base -- Ubuntu 26.04 LTS + Python 3 for the
# managed hosts, nutsh v2.0.0 + pinned ansible-core 2.18.1 for the control
# node -- instead of pulled from turkenh's archived `:1.1` Docker Hub tags.
# Every job that runs tutorial.sh now builds first. hadolint is clean except
# two DL3008/DL3018 "pin package versions" warnings for the non-ansible
# packages (curl, git, vim, sudo, ...) -- left soft and unpinned
# deliberately: exact-pinning every apt/apk package is what made the
# original `ubuntu:16.04` Dockerfile stop building in the first place
# (a pinned version eventually leaves the current release's repo). Only
# ansible/ansible-core are pinned, because tutorial *content* depends on
# their exact behaviour (see the `result is failed` fix below). See
# docs/FASE3.md.
#
# Fase 3 ALSO surfaced a nutsh v2.0.0 regression: `nutsh test` panics
# ("Expect was not reached") on almost every lesson, even though the
# command visibly ran and matched -- a race condition in nutsh's own PTY
# tokenizer (confirmed by reading nutsh's source), not a tutorial-content
# bug. Interactive mode is unaffected -- T4 (a real PTY session, what an
# actual user experiences) is fully green on v2.0.0, including #12/#22/#37.
#
# Fase 4 (this change): rather than fork/patch nutsh's Go internals (a
# large, indefinite maintenance commitment for a bug in someone else's PTY
# state machine), T1/T3/T7 now drive each lesson's real command sequence
# directly via tests/t1_lessons.py -- extracted straight from the `.nutsh`
# source's own `expect(...)` commands, executed for real via `docker exec`,
# bypassing nutsh's test-mode interpreter entirely. This gives HONEST
# signal where nutsh's testmode gave none (it panicked before reaching real
# problems): T1 itself is 14 of 15 lessons genuinely verified green
# end-to-end (only 13-step-13/Jenkins red, the already-tracked #32/#39, now
# diagnosed more precisely). T3/T7 still show their own pre-existing,
# already-documented content findings now that the panic no longer masks
# them (T3 apache: service never started, fase-1 finding; T7: apache
# `command:` tasks aren't idempotent, fase-0 finding) -- both fase-5 work.
# docs/FASE4.md documents 3 real image/infra bugs (missing iproute2, a
# PID-1-naming collision with ansible's service-manager detection, a
# template missing a trailing newline) and 1 content bug (outdated
# `ansible-galaxy` CLI syntax) that nutsh's panic had been masking since
# fase 0, all fixed in this change.

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck tutorial.sh
        # Blocking as of fase 2: tutorial.sh is shellcheck-clean.
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck tutorial.sh
      - name: hadolint Dockerfiles
        # Soft by design: the 2 remaining warnings are deliberate (see fase-3
        # header comment above), not oversights.
        continue-on-error: true
        run: |
          docker run --rm -v "${PWD}:/work" -w /work hadolint/hadolint \
            hadolint images/ansible-managed-host/Dockerfile images/ansible-tutorial/Dockerfile

  t1-lessons:
    name: t1 (${{ matrix.lesson }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        lesson:
          - 0-step-00
          - 1-step-01
          - 2-step-02
          - 3-step-03
          - 4-step-04
          - 5-step-05
          - 6-step-06
          - 7-step-07
          - 8-step-08
          - 9-step-09
          - 10-step-10
          - 11-step-11
          - 12-step-12
          - 13-step-13
          - 14-freeplay
    steps:
      - uses: actions/checkout@v4
      - name: build images
        run: make -C images build_all
      - name: start environment
        run: ./tests/env.sh up
      - name: t1 -- ${{ matrix.lesson }}
        # Verified locally (fase 4) on a fully fresh environment: 14 of 15
        # lessons pass end-to-end via tests/t1_lessons.py. Only 13-step-13
        # (Jenkins) is expected-fail, on content grounds (#32/#39) -- see
        # docs/FASE4.md for the precise diagnosis.
        continue-on-error: ${{ matrix.lesson == '13-step-13' }}
        run: python3 tests/t1_lessons.py ${{ matrix.lesson }}
      - name: cleanup
        if: always()
        run: ./tests/env.sh down

  t2-lifecycle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./tests/t2_lifecycle.sh

  t3-checkpoints:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: build images
        run: make -C images build_all
      - name: apache checkpoint (lesson 5)
        # Blocking as of fase 5: files/step-4/apache.yml now explicitly
        # starts apache2 (was installed but never started, the fase-1
        # finding). Verified locally and on GitHub's runners -- HTTP 200.
        run: ./tests/t3_checkpoints.sh apache
      - name: jenkins checkpoint (lesson 14)
        # Permanently expected-fail -- #32/#39. Fase 6 fixed two real bugs
        # here (openjdk-25-jdk doesn't exist as a package on Ubuntu 26,
        # host0's apt cache was never updated before this lesson) and got
        # much further. Fase 7 then confirmed *no* released
        # geerlingguy.jenkins version works on our containers: versions
        # before 5.0.0 need the `apt-key` binary, which Ubuntu 26.04 has
        # removed entirely; 5.0.0+ calls the `systemd:` module directly
        # and unconditionally (needs a real systemd D-Bus connection our
        # init-less containers don't have) -- and the apt-key fix landed
        # *after* the systemd switch upstream, so there's no overlapping
        # safe version. Fixing this for real means running actual systemd
        # in the managed-host containers, a project-wide architecture
        # change; the project owner decided against that (fase 7) --
        # Jenkins stays a documented, accepted limitation. See
        # docs/FASE7.md.
        continue-on-error: true
        run: ./tests/t3_checkpoints.sh jenkins

  t7-idempotency:
    runs-on: ubuntu-latest
    # Blocking as of fase 5: creates=/removes=/changed_when: false added to
    # the a2ensite/a2dissite/apache2ctl configtest command: tasks. Verified
    # locally and on GitHub's runners -- T7: PASS, all 7 scoped lessons
    # idempotent. See docs/FASE5.md.
    steps:
      - uses: actions/checkout@v4
      - name: build images
        run: make -C images build_all
      - run: ./tests/t7_idempotency.sh

  t4-pty:
    runs-on: ubuntu-latest
    # Exercises nutsh's interactive layer (menu, #12, #22, #37) -- the mode
    # an actual user experiences; the v2.0.0 regression affects only
    # `nutsh test` (see workflow header).
    #
    # Blocking again as of fase 14, with the check-#12 flakiness actually
    # root-caused this time (not guessed): a debug dump captured from a real
    # CI failure showed the shell prompt DID appear as "~ $", but the test
    # demanded "~/workspace $" -- the lesson's `cd /root/workspace` hadn't
    # always taken effect before the prompt rendered. It was a too-specific
    # test regex, not a nutsh timing race; the test now matches the prompt
    # generically. Confirmed across many workflow_dispatch runs before
    # re-enabling. See docs/FASE14.md.
    steps:
      - uses: actions/checkout@v4
      - name: build images
        run: make -C images build_all
      - run: ./tests/env.sh up
      - run: python3 tests/t4_pty.py
      - name: cleanup
        if: always()
        run: ./tests/env.sh down

  t6-podman:
    runs-on: ubuntu-latest
    # The podman-specific bugs are fixed: #33's core bug in fase 2
    # (setupFiles() portable inspect), and the `make -C images build_all`
    # subuid/subgid failure in fase 6 (images/Makefile's `USER=beverdam`
    # was shadowing the real $USER rootless podman's subuid lookup reads;
    # renamed to IMAGE_NAMESPACE). Both confirmed green on GitHub's runner.
    #
    # Blocking again as of fase 14, alongside t4-pty: the intermittent
    # failure this job hit on fase 7/11 was the t4_pty.py check-#12 test
    # bug (see the t4-pty job comment), now root-caused and fixed -- not a
    # podman regression. See docs/FASE14.md.
    steps:
      - uses: actions/checkout@v4
      - name: install podman
        run: sudo apt-get update && sudo apt-get install -y podman
      - name: configure docker.io as an unqualified-search registry
        # Ubuntu's podman package ships no unqualified-search-registries
        # by default (only a curated shortnames list for official images),
        # so `podman pull turkenh/...` fails to resolve before any of the
        # documented #33 symptoms are ever reached. tutorial.sh uses short
        # names throughout, so this is fixed at the registry-config layer
        # rather than by qualifying every image reference.
        run: |
          sudo mkdir -p /etc/containers/registries.conf.d
          printf 'unqualified-search-registries = ["docker.io"]\n' | sudo tee /etc/containers/registries.conf.d/999-docker-io.conf
      - name: shim docker -> podman
        run: echo "${GITHUB_WORKSPACE}/tests/podman-shim" >> "${GITHUB_PATH}"
      - name: build images (via the podman shim)
        run: make -C images build_all
      - run: ./tutorial.sh --remove
      - name: t1 smoke (lesson 0)
        # tests/t1_lessons.py drives lessons via `docker exec`, which
        # resolves through the podman shim on PATH exactly like every other
        # `docker` call in this job -- same as the fase-4 replacement in the
        # t1-lessons job, just not run as a full matrix here (this job is
        # about podman compat, not lesson coverage).
        run: |
          ./tests/env.sh up
          python3 tests/t1_lessons.py 0-step-00
          ./tests/env.sh down
      - run: ./tests/t2_lifecycle.sh
      - run: ./tests/env.sh up
      - run: python3 tests/t4_pty.py
      - name: cleanup
        if: always()
        run: ./tests/env.sh down
